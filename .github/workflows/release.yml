name: Release Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version from git tags
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST=$(jq -r '"v" + .version' .claude-plugin/plugin.json)
          fi
          MAJOR=$(echo "$LATEST" | tr -d 'v' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | tr -d 'v' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | tr -d 'v' | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build .plugin archive
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json
          zip -r dev-proposal-toolkit.plugin .claude-plugin/ skills/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dev-proposal-toolkit.plugin
